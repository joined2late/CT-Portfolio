<div id="image-lightbox" class="lightbox-overlay" onclick="closeLightbox()">
    <span class="lightbox-close">&times;</span>
    <img class="lightbox-content" id="lightbox-target-img" alt="Fullscreen View">
</div>

<script>
    function openLightbox(element) {
        var lightbox = document.getElementById("image-lightbox");
        var lightboxImg = document.getElementById("lightbox-target-img");
        lightbox.style.display = "flex";
        lightboxImg.src = element.src;
    }
    function closeLightbox() {
        document.getElementById("image-lightbox").style.display = "none";
    }
    document.addEventListener("DOMContentLoaded", function () {
        var images = document.querySelectorAll('.box-image, .placeholder');
        images.forEach(function (img) {
            img.style.cursor = 'pointer';
            img.setAttribute('onclick', 'openLightbox(this)');
        });
    });
</script>
